<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>ElectroMart - Your Electronics Store</h1>
        <div class="cart-summary">
            <span>Cart (<span id="cart-count">0</span>)</span>
            <button id="cart-toggle">🛒 View Cart</button>
        </div>
    </header>

    <main>
        <section class="products" id="products">
            <h2>Featured Products</h2>
            <div class="product-grid">
                <!-- Products will be populated by JS or static here for basic -->
                <div class="product" data-id="1" data-name="iPhone 15" data-price="999">
                    <img src="https://m.media-amazon.com/images/I/71657TiFeHL._SX679_.jpg" alt="iPhone 15" loading="lazy">
                    <h3>iPhone 15</h3>
                    <p class="price">$999.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="product" data-id="2" data-name="MacBook Pro" data-price="1999">
                    <img src="https://m.media-amazon.com/images/I/61h78UMEXjL._AC_UY327_FMwebp_QL65_.jpg" alt="MacBook Pro" loading="lazy">
                    <h3>MacBook Pro</h3>
                    <p class="price">$1,999.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="product" data-id="3" data-name="Samsung TV" data-price="799">
                    <img src="https://m.media-amazon.com/images/I/81PLRd3HtUL._AC_SX416_CB1169409_QL70_.jpg" alt="Samsung TV" loading="lazy">
                    <h3>Samsung 55" TV</h3>
                    <p class="price">$799.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="product" data-id="4" data-name="AirPods Pro" data-price="249">
                    <img src="https://m.media-amazon.com/images/I/61IyZTvsfmL._AC_SX416_CB1169409_QL70_.jpg" alt="AirPods Pro" loading="lazy">
                    <h3>AirPods Pro</h3>
                    <p class="price">$249.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </section>

        <!-- Cart Modal -->
        <section class="cart-modal" id="cart-modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Shopping Cart</h2>
                <div id="cart-items"></div>
                <div class="cart-totals">
                    <p>Subtotal: $<span id="subtotal">0.00</span></p>
                    <p>Tax (10%): $<span id="tax">0.00</span></p>
                    <p>Total: $<span id="total">0.00</span></p>
                </div>
                <button id="checkout-btn" style="display:none;">Proceed to Checkout</button>
            </div>
        </section>

        <!-- Checkout Form -->
        <section class="checkout-form" id="checkout-form" style="display:none;">
            <h2>Checkout</h2>
            <form id="checkout">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Address" required>
                <input type="text" placeholder="City" required>
                <input type="text" placeholder="ZIP Code" required>
                <button type="submit">Place Order</button>
                <button type="button" id="back-to-cart">Back to Cart</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
